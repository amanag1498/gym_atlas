name: gym_flutter_core
description: Shared core package for the connected gym ecosystem Flutter apps.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.3.0
  socket_io_client: ^3.1.2
  provider: ^6.1.5
  intl: ^0.20.2
  go_router: ^16.2.1
  google_fonts: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
