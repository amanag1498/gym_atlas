name: flutter_admin_app
description: Connected Gym admin app for platform admins, owners, managers, and staff.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  flutter_secure_storage: ^9.2.4
  go_router: ^16.2.1
  google_sign_in: ^6.3.0
  provider: ^6.1.5+1
  mobile_scanner: ^7.0.1
  intl: ^0.20.2
  socket_io_client: ^3.1.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
